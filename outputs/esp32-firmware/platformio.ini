[env:esp32-s3-devkitc-1]
platform = espressif32 @ 6.8.1
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32s3_exception_decoder, direct

; ESP32-S3 N16R8: 16MB Flash + 8MB Octal PSRAM
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.partitions = default_16MB.csv

; USB CDC 串口
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DUSER_SETUP_LOADED

    ; Octal PSRAM 配置 (N16R8 专用)
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM=y
    -DCONFIG_SPIRAM_MODE_OCT=y
    -DCONFIG_SPIRAM_SPEED_80M=y
    -mfix-esp32-psram-cache-issue
    -DCONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST=n

    ; TFT_eSPI — GC9A01 圆形屏 240x240
    -DGC9A01_DRIVER
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=9
    -DTFT_RST=8
    -DTFT_BL=-1
    -DSPI_FREQUENCY=20000000
    -DSPI_READ_FREQUENCY=16000000
    -DSPI_TOUCH_FREQUENCY=2500000

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
